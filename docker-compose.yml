# Stillframe — local-first, two-container app.
# Phase 1: backend only. Frontend service added once the UI exists.

services:
  backend:
    build: ./backend
    container_name: stillframe-backend
    env_file: .env
    environment:
      # Override so the container reaches host-published Ollama.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      DB_PATH: /data/stillframe.db
    ports:
      # Bind to localhost only — never expose the backend directly.
      # Public access should go through the Cloudflare Tunnel (see Security doc).
      - "127.0.0.1:5181:8000"
    volumes:
      - stillframe-data:/data
    extra_hosts:
      # Lets the container resolve the host (Linux parity with Docker Desktop).
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # frontend:
  #   build: ./frontend
  #   container_name: stillframe-frontend
  #   ports:
  #     - "127.0.0.1:5180:80"
  #   depends_on:
  #     - backend
  #   restart: unless-stopped

volumes:
  stillframe-data:
